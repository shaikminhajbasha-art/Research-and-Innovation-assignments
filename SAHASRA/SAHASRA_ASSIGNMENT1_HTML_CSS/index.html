<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Showcase</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="logo">MyProduct</div>
    <ul class="nav-links">
      <li><a href="#">Home</a></li>
      <li><a href="#product">Product</a></li>
      <li><a href="#features">Features</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
  </nav>

  <!-- Product Section -->
  <section id="product" class="product-section">
    <div class="product-container">
      <img src="https://www.kaktusmoda.com/i/l/010/0103273_sifon-kumas-kat-kat-kadin-elbise-kirmizi.jpeg" alt="Product Image" class="product-image">
      <div class="product-info">
        <h1>100$</h1>
        <p>Red Plane Polyster Fabric</p>
        <button>Buy Now</button>
      </div>
    </div>
  </section>

  <!-- Features Section -->
  <section id="features" class="features-section">
    <h2>Features</h2>
    <div class="features-container">
      <div class="feature-card">
        <h3>Offer</h3>
        <p>Get <span class="discount">50% OFF</span> on your first purchase!</p>
      </div>
      <div class="feature-card">
        <h3>Cashback</h3>
        <p>Get Cashback upto<span class="cashback">10$</span></p>
      </div>
      <div class="feature-card">
        <h3>Return</h3>
        <p>Return avalaibility untill 6th Aprill</p>
      </div>
    </div>
  </section>

</body>
</html>
