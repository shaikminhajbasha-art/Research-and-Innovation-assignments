<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Quiz App</title>

<style>
    body {
        font-family: Times New Roman, serif;
        background: #f4f4f4;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .quiz-container {
        background: white;
        padding: 20px;
        border-radius: 10px;
        width: 350px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h2 {
        margin-bottom: 15px;
    }

    .option {
        display: block;
        margin: 8px 0;
        padding: 8px;
        background: #eee;
        border-radius: 5px;
        cursor: pointer;
    }

    .option:hover {
        background: #007BFF;
    }

    button {
        margin-top: 15px;
        padding: 10px;
        width: 100%;
        border: none;
        background: #1A237E;
        color: white;
        font-size: 16px;
        border-radius: 5px;
        cursor: pointer;
    }

    button:hover {
        background: #4682B4;
    }

    #result {
        text-align: center;
        font-size: 20px;
    }
</style>
</head>

<body>

<div class="quiz-container">
    <h2 id="question">Question</h2>
    <div id="options"></div>
    <button onclick="nextQuestion()">Next</button>
    <div id="result"></div>
</div>

<script>
const quiz = [
    {
        question: "What is HTML?",
        options: ["Programming Language", "Markup Language", "Database", "Operating System"],
        answer: "Markup Language"
    },
    {
        question: "Which is used for styling?",
        options: ["HTML", "CSS", "Java", "Python"],
        answer: "CSS"
    },
    {
        question: "Which language is used for logic?",
        options: ["CSS", "HTML", "JavaScript", "SQL"],
        answer: "JavaScript"
    },
    {
        question: "Which tag is used for heading?",
        options: ["<p>", "<h1>", "<div>", "<span>"],
        answer: "<h1>"
    },
    {
        question: "Which is a database?",
        options: ["MySQL", "HTML", "CSS", "JS"],
        answer: "MySQL"
    }
];

let currentQuestion = 0;
let score = 0;
let selected = "";

function loadQuestion() {
    const q = quiz[currentQuestion];
    document.getElementById("question").innerText = q.question;

    const optionsDiv = document.getElementById("options");
    optionsDiv.innerHTML = "";

    q.options.forEach(option => {
        const div = document.createElement("div");
        div.classList.add("option");
        div.innerText = option;

        div.onclick = () => {
            selected = option;
            document.querySelectorAll(".option").forEach(o => o.style.background = "#eee");
            div.style.background = "#c8f7c5";
        };

        optionsDiv.appendChild(div);
    });
}

function nextQuestion() {
    if (!selected) {
        alert("Please select an option!");
        return;
    }

    if (selected === quiz[currentQuestion].answer) {
        score++;
    }

    selected = "";
    currentQuestion++;

    if (currentQuestion < quiz.length) {
        loadQuestion();
    } else {
        showResult();
    }
}

function showResult() {
    document.getElementById("question").style.display = "none";
    document.getElementById("options").style.display = "none";
    document.querySelector("button").style.display = "none";

    document.getElementById("result").innerText =
        "Your Score: " + score + " / " + quiz.length;
}

loadQuestion();
</script>

</body>
</html>
